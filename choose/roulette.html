<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Mushroom Retainer - Sound FX Edition</title>
    <style>
        :root {
            --item-width: 300px; 
            --view-width: 600px;
            --row-height: 120px;
            --interface-gold: #490432;
            --bg-pink: #f8c0c8;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: url('gamebg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(68, 68, 68, 0.8);
            color: #fff;
            border: 3px solid #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 4px 4px 0 #000;
            z-index: 100;
        }

        #score-board { 
            font-size: 28px; 
            margin-bottom: 0px;
            color: #fff; 
            text-shadow: 3px 3px #e4000f;
            z-index: 20;
        }

        .game-window {
            width: var(--view-width);
            height: calc(var(--row-height) * 3);
            border: 10px solid var(--interface-gold);
            background-color: rgba(248, 192, 200, 0.85);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            z-index: 20;
            transform: translateZ(0);
        }

        .win-flash { animation: flashBackground 0.2s infinite; }
        @keyframes flashBackground {
            0% { background-color: var(--bg-pink); }
            50% { background-color: var(--interface-gold); }
            100% { background-color: var(--bg-pink); }
        }

        .shake { animation: screenShake 0.4s; }
        @keyframes screenShake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-8px, 0, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(8px, 0, 0); }
        }

        .game-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('interface_frame.png');
            background-size: 100% 100%;
            z-index: 10;
            pointer-events: none;
            transform: translateZ(0);
        }

        .row-container {
            height: var(--row-height);
            width: 100%;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .strip {
            display: flex;
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 2700px; 
            background-image: url('strips.png');
            background-repeat: repeat-x;
            background-size: calc(var(--item-width) * 3) auto;
            image-rendering: pixelated;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        /* UPDATED: Third strip fine-tuned to -241px */
        #strip-0 { background-position-y: 2px; } 
        #strip-1 { background-position-y: -120px; }  
        #strip-2 { background-position-y: -241px; } 

        .controls { margin-top: 40px; z-index: 20; }
        
        button.game-btn {
            padding: 20px 50px; 
            font-size: 24px; 
            background: #e4000f;
            color: white; 
            border: 6px solid #fff; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 #000;
        }
        button.game-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0; }
        button.game-btn:disabled { background: #444; opacity: 0.5; }

        #message { 
            margin-bottom: 20px; 
            font-size: 32px; 
            color: var(--interface-gold); 
            text-shadow: 3px 3px #000; 
            height: 40px;
            z-index: 20;
        }
    </style>
</head>
<body>

    <button id="music-toggle" onclick="toggleMusic()">MUSIC: OFF</button>

    <audio id="bg-music" src="playerzero.mp3" loop></audio>
    <audio id="sfx-spin" src="spin.mp3" loop></audio>
    <audio id="sfx-choose" src="choose.mp3"></audio>
    <audio id="sfx-winner" src="winner.mp3"></audio>
    <audio id="sfx-loose" src="loose.mp3"></audio>

    <div id="score-board">HI-SCORE: <span id="count">00</span></div>
    <div id="message">PRESS START</div>

    <div class="game-window" id="screen">
        <div class="game-frame"></div>
        <div class="row-container"><div id="strip-0" class="strip"></div></div>
        <div class="row-container"><div id="strip-1" class="strip"></div></div>
        <div class="row-container"><div id="strip-2" class="strip"></div></div>
    </div>

    <div class="controls">
        <button id="stop-btn" class="game-btn" onclick="handleStop()">STOP</button>
        <button id="reset-btn" class="game-btn" onclick="resetGame()" style="display:none; background:#444;">RETRY</button>
    </div>

    <script>
        const itemW = 300;
        const viewW = 600;
        const centerX = (viewW / 2) - (itemW / 2);
        const iconCount = 3;
        const loopLimit = itemW * iconCount; 
        
        const music = document.getElementById('bg-music');
        const sfxSpin = document.getElementById('sfx-spin');
        const sfxChoose = document.getElementById('sfx-choose');
        const sfxWinner = document.getElementById('sfx-winner');
        const sfxLoose = document.getElementById('sfx-loose');

        music.volume = 0.5;
        sfxSpin.volume = 0.3;

        let currentActiveRow = 0;
        let isGameOver = false;
        let results = [];
        let jackpots = parseInt(localStorage.getItem('jackpots')) || 0;
        document.getElementById('count').innerText = jackpots.toString().padStart(2, '0');

        const BASE_SPEEDS = [-900, 1300, -1100];

        const strips = [
            { id: 'strip-0', pos: 0, speed: BASE_SPEEDS[0], stopping: false, snapped: false },
            { id: 'strip-1', pos: 0, speed: BASE_SPEEDS[1], stopping: false, snapped: false },
            { id: 'strip-2', pos: 0, speed: BASE_SPEEDS[2], speed: BASE_SPEEDS[2], stopping: false, snapped: false }
        ];

        let lastTime = 0;

        // Spacebar cheat listener
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isGameOver) {
                e.preventDefault(); 
                triggerCheatCode();
            }
        });

        function toggleMusic() {
            const btn = document.getElementById('music-toggle');
            if (music.paused) {
                music.play().catch(e => {});
                btn.innerText = "MUSIC: ON";
                btn.classList.add('playing');
            } else {
                music.pause();
                btn.innerText = "MUSIC: OFF";
                btn.classList.remove('playing');
            }
        }

        function update(currentTime) {
            if (!lastTime) lastTime = currentTime;
            let dt = (currentTime - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; 
            lastTime = currentTime;

            strips.forEach((s) => {
                const el = document.getElementById(s.id);

                if (s.stopping && !s.snapped) {
                    s.speed *= Math.pow(0.15, dt); 
                    
                    if (Math.abs(s.speed) < 40) {
                        let target = Math.round((s.pos - centerX) / itemW) * itemW + centerX;
                        let diff = target - s.pos;
                        
                        s.pos += diff * (1 - Math.pow(0.001, dt));
                        s.speed = 0;
                        
                        if (Math.abs(diff) < 0.5) {
                            s.pos = target;
                            s.snapped = true;
                            sfxChoose.currentTime = 0;
                            sfxChoose.play().catch(o => {});
                            onRowSettled();
                        }
                    }
                }
                
                s.pos += s.speed * dt;
                
                if (s.pos > 0) s.pos -= loopLimit;
                if (s.pos < -loopLimit) s.pos += loopLimit;
                
                el.style.transform = `translate3d(${s.pos}px, 0px, 0px)`;
            });

            if (!isGameOver) {
                requestAnimationFrame(update);
            }
        }

        function handleStop() {
            if (music.paused && document.getElementById('music-toggle').innerText === "MUSIC: OFF") {
                toggleMusic();
            }
            if (sfxSpin.paused) {
                sfxSpin.play().catch(o => {});
            }

            if (currentActiveRow < 3) {
                strips[currentActiveRow].stopping = true;
                document.getElementById('stop-btn').disabled = true;
                document.getElementById('message').innerText = "STOPPING...";
            }
        }

        function onRowSettled() {
            const s = strips[currentActiveRow];
            const normalizedPos = Math.abs(Math.round((s.pos - centerX) / itemW)) % iconCount;
            results.push(normalizedPos);

            currentActiveRow++;
            if (currentActiveRow < 3) {
                document.getElementById('stop-btn').disabled = false;
            } else {
                checkResult();
            }
        }

        function triggerCheatCode() {
            let firstRowTargetIndex = Math.round((strips[0].pos - centerX) / itemW);
            let perfectTargetPos = firstRowTargetIndex * itemW + centerX;

            strips.forEach((s) => {
                s.pos = perfectTargetPos;
                s.speed = 0;
                s.stopping = true;
                s.snapped = true;
            });

            sfxChoose.currentTime = 0;
            sfxChoose.play().catch(o => {});

            currentActiveRow = 3;
            const normalizedPos = Math.abs(firstRowTargetIndex) % iconCount;
            results = [normalizedPos, normalizedPos, normalizedPos];
            
            checkResult();
        }

        function checkResult() {
            isGameOver = true;
            sfxSpin.pause();
            sfxSpin.currentTime = 0;

            const win = results.every(val => val === results[0]);
            const msg = document.getElementById('message');
            const screen = document.getElementById('screen');
            
            if (win) {
                msg.innerText = "!!! JACKPOT !!!";
                screen.classList.add('win-flash');
                sfxWinner.play().catch(o => {});
                jackpots++;
                localStorage.setItem('jackpots', jackpots);
                document.getElementById('count').innerText = jackpots.toString().padStart(2, '0');
            } else {
                msg.innerText = "GAME OVER";
                msg.style.color = "#ff4444";
                screen.classList.add('shake');
                sfxLoose.play().catch(o => {});
            }
            
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'inline-block';
        }

        function resetGame() {
            isGameOver = false;
            currentActiveRow = 0;
            results = [];
            const screen = document.getElementById('screen');
            screen.classList.remove('win-flash', 'shake');
            
            sfxSpin.play().catch(o => {});

            strips.forEach((s, i) => {
                s.stopping = false;
                s.snapped = false;
                s.speed = BASE_SPEEDS[i];
            });

            document.getElementById('message').innerText = "READY?";
            document.getElementById('message').style.color = "";
            document.getElementById('stop-btn').style.display = 'inline-block';
            document.getElementById('stop-btn').disabled = false;
            document.getElementById('reset-btn').style.display = 'none';
            
            lastTime = 0; 
            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
