<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Gamify Explorer</title>
    <style>
        :root {
            --bg-overlay: rgba(5, 5, 5, 0.7);
            --accent-color: #00d2ff;
            --stage-width: 350px; 
            --stage-height: 350px;
            --spread-near: 450px; 
            --spread-far: 850px;
            --z-active: 400px;
        }

        @media (max-width: 768px) {
            :root {
                --stage-width: 240px;
                --stage-height: 240px;
                --spread-near: 180px;
                --spread-far: 320px;
                --z-active: 250px;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .stage {
            perspective: 2000px; 
            width: 100%;
            height: 60vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel {
            position: relative;
            width: var(--stage-width);
            height: var(--stage-height);
            transform-style: preserve-3d;
        }

        .album-card {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            -webkit-box-reflect: below 20px linear-gradient(transparent, rgba(255,255,255,0.06));
            touch-action: none;
        }

        .album-card img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* --- 3D STATES --- */
        .album-card.active {
            transform: translate3d(0, 0, var(--z-active)) scale(1.3);
            z-index: 100;
            filter: blur(0) brightness(1.1);
        }

        .album-card.left {
            transform: translate3d(calc(var(--spread-near) * -1), 0, -200px) rotateY(45deg) scale(1.3);
            z-index: 50;
            filter: blur(3px) brightness(0.4);
            opacity: 0.7;
        }

        .album-card.far-left {
            transform: translate3d(calc(var(--spread-far) * -1), 0, -500px) rotateY(60deg) scale(1.3);
            z-index: 20;
            filter: blur(6px) brightness(0.2);
            opacity: 0.3;
        }

        .album-card.right {
            transform: translate3d(var(--spread-near), 0, -200px) rotateY(-45deg) scale(1.3);
            z-index: 50;
            filter: blur(3px) brightness(0.4);
            opacity: 0.7;
        }

        .album-card.far-right {
            transform: translate3d(var(--spread-far), 0, -500px) rotateY(-60deg) scale(1.3);
            z-index: 20;
            filter: blur(6px) brightness(0.2);
            opacity: 0.3;
        }

        .album-card.hidden {
            transform: translate3d(0, 0, -1500px) scale(1.3);
            opacity: 0;
            pointer-events: none;
        }

        /* --- UI PANEL --- */
        .info-panel {
            margin-top: 20px;
            text-align: center;
            z-index: 200;
            padding: 0 20px;
        }

        #album-title { font-size: 2.4rem; margin: 0; letter-spacing: 4px; font-weight: 800; }
        #album-artist { color: var(--accent-color); font-size: 1.1rem; margin-top: 5px; letter-spacing: 2px; }

        .hint {
            margin-top: 25px;
            font-size: 0.75rem;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="carousel" id="carousel"></div>
    </div>

    <div class="info-panel">
        <h2 id="album-title"></h2>
        <p id="album-artist"></p>
        <div class="hint">Tap active image to enter</div>
    </div>

    <audio id="musicPlayer"></audio>

    <script>
        const albumData = [
            { 
                title: "ROULETTE", 
                artist: "Perfect Matches", 
                cover: "1choose.png", 
                music: "playerzero.mp3", 
                url: "https://roripuff.github.io/gamify/choose/roulette.html" 
            },
            { 
                title: "CHIBI ATHLETICS", 
                artist: "Track& Field Challenge", 
                cover: "2run.png", 
                music: "track_field.mp3", 
                url: "https://roripuff.github.io/gamify/run/Olympics.html" 
            },
            { 
                title: "CYBER CHIBI", 
                artist: "Data Fall", 
                cover: "3fall.png", 
                music: "raindrops.mp3", 
                url: "https://roripuff.github.io/gamify/letters/Gesture.html" 
            },
            { 
                title: "THE DETERMINED HUG", 
                artist: "Stormchaser's Pursuit", 
                cover: "4chase.png", 
                music: "chase.mp3", 
                url: "https://roripuff.github.io/gamify/chase/chase.html" 
            },
            { 
                title: "GARDEN OF GHOULS", 
                artist: "Chase the Rabbits", 
                cover: "5light.png", 
                music: "Catch-Me.mp3", 
                url: "https://roripuff.github.io/gamify/light/Light.html" 
            }
        ];

        const carousel = document.getElementById('carousel');
        const titleEl = document.getElementById('album-title');
        const artistEl = document.getElementById('album-artist');
        const player = document.getElementById('musicPlayer');

        let currentIndex = 2;
        let isTransitioning = false;
        let touchStartX = 0;

        albumData.forEach((album, index) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            const img = document.createElement('img');
            img.src = album.cover;
            card.appendChild(img);
            
            card.addEventListener('click', () => {
                if (index === currentIndex) {
                    window.location.href = album.url;
                } else {
                    navigateTo(index);
                }
            });
            carousel.appendChild(card);
        });

        const cards = Array.from(document.querySelectorAll('.album-card'));

        function navigateTo(index) {
            if (index < 0 || index >= albumData.length || isTransitioning) return;
            currentIndex = index;
            updateCarousel();
            playMusic(index);
            isTransitioning = true;
            setTimeout(() => { isTransitioning = false; }, 500);
        }

        function updateCarousel() {
            cards.forEach((card, i) => {
                card.className = 'album-card'; 
                if (i === currentIndex) card.classList.add('active');
                else if (i === currentIndex - 1) card.classList.add('left');
                else if (i === currentIndex - 2) card.classList.add('far-left');
                else if (i === currentIndex + 1) card.classList.add('right');
                else if (i === currentIndex + 2) card.classList.add('far-right');
                else card.classList.add('hidden');
            });
            titleEl.innerText = albumData[currentIndex].title;
            artistEl.innerText = albumData[currentIndex].artist;
        }

        function playMusic(index) {
            player.src = albumData[index].music;
            player.play().catch(() => {});
        }

        // --- NAVIGATION HELPERS ---
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) navigateTo(currentIndex + 1);
            else navigateTo(currentIndex - 1);
        }, { passive: true });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'd') navigateTo(currentIndex + 1);
            else if (e.key === 'ArrowLeft' || e.key === 'a') navigateTo(currentIndex - 1);
            else if (e.key === 'Enter') window.location.href = albumData[currentIndex].url;
        });

        window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        window.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) navigateTo(currentIndex + 1);
            if (touchEndX > touchStartX + 50) navigateTo(currentIndex - 1);
        }, { passive: true });

        updateCarousel();
    </script>
</body>
</html>
