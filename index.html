<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Gamify Explorer - Large Focus</title>
    <style>
        :root {
            --bg-overlay: rgba(0, 0, 0, 0.75); 
            --accent-color: #00d2ff;
            --stage-width: 320px; 
            --stage-height: 320px;
            --spread-near: 280px; 
            --spread-far: 550px;
            /* Pushed further forward for larger presence */
            --z-active: 500px; 
        }

        @media (max-width: 768px) {
            :root {
                --stage-width: 220px;
                --stage-height: 220px;
                --spread-near: 130px;
                --spread-far: 260px;
                --z-active: 320px;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.5) 100%), var(--bg-overlay);
            backdrop-filter: blur(3px); 
            -webkit-backdrop-filter: blur(3px);
            z-index: -1;
        }

        .stage {
            perspective: 2000px; 
            width: 100%;
            height: 60vh; /* Increased slightly for larger covers */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel {
            position: relative;
            width: var(--stage-width);
            height: var(--stage-height);
            transform-style: preserve-3d;
        }

        .album-card {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            -webkit-box-reflect: below 20px linear-gradient(transparent, rgba(255,255,255,0.06));
            touch-action: none;
        }

        .album-card img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            filter: drop-shadow(0 25px 60px rgba(0,0,0,1));
            pointer-events: none;
        }

        /* --- UPDATED LARGER 3D STATES --- */
        .album-card.active {
            /* Increased to 1.5x */
            transform: translate3d(0, 0, var(--z-active)) scale(1.5);
            z-index: 100;
            filter: blur(0) brightness(1.2);
        }

        .album-card.left {
            /* Increased side scale to 1.2x */
            transform: translate3d(calc(var(--spread-near) * -1), 0, -120px) rotateY(30deg) scale(1.2);
            z-index: 50;
            filter: blur(0.5px) brightness(0.65); 
            opacity: 0.85;
        }

        .album-card.far-left {
            transform: translate3d(calc(var(--spread-far) * -1), 0, -350px) rotateY(45deg) scale(1.1);
            z-index: 20;
            filter: blur(1.5px) brightness(0.4);
            opacity: 0.5;
        }

        .album-card.right {
            transform: translate3d(var(--spread-near), 0, -120px) rotateY(-30deg) scale(1.2);
            z-index: 50;
            filter: blur(0.5px) brightness(0.65);
            opacity: 0.85;
        }

        .album-card.far-right {
            transform: translate3d(var(--spread-far), 0, -350px) rotateY(-45deg) scale(1.1);
            z-index: 20;
            filter: blur(1.5px) brightness(0.4);
            opacity: 0.5;
        }

        .album-card.hidden {
            transform: translate3d(0, 0, -1500px);
            opacity: 0;
            pointer-events: none;
        }

        /* --- UI PANEL --- */
        .info-panel {
            margin-top: 30px;
            text-align: center;
            z-index: 200;
        }

        #album-title { 
            font-size: 2.5rem; 
            margin: 0; 
            letter-spacing: 4px; 
            font-weight: 800;
            text-shadow: 0 5px 20px rgba(0,0,0,0.9);
        }
        
        #album-artist { 
            color: var(--accent-color); 
            font-size: 1.1rem; 
            margin-top: 8px; 
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .nav-indicators {
            display: flex;
            gap: 12px;
            margin: 45px auto 0;
            z-index: 200;
            justify-content: center;
        }

        .indicator-bar {
            width: 25px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .indicator-bar.active {
            width: 50px;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .hint-text {
            margin-top: 15px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="carousel" id="carousel"></div>
    </div>

    <div class="info-panel">
        <h2 id="album-title"></h2>
        <p id="album-artist"></p>
        
        <div class="nav-indicators" id="navIndicators"></div>
        <div class="hint-text">Swipe / Scroll / Arrows</div>
    </div>

    <audio id="musicPlayer"></audio>

    <script>
        const albumData = [
            { title: "ROULETTE", artist: "Perfect Matches", cover: "1choose.png", music: "playerzero.mp3", url: "https://roripuff.github.io/gamify/choose/roulette.html" },
            { title: "CHIBI ATHLETICS", artist: "Track& Field Challenge", cover: "2run.png", music: "track_field.mp3", url: "https://roripuff.github.io/gamify/run/Olympics.html" },
            { title: "CYBER CHIBI", artist: "Data Fall", cover: "3fall.png", music: "raindrops.mp3", url: "https://roripuff.github.io/gamify/letters/Gesture.html" },
            { title: "THE DETERMINED HUG", artist: "Stormchaser's Pursuit", cover: "4chase.png", music: "chase.mp3", url: "https://roripuff.github.io/gamify/chase/chase.html" },
            { title: "GARDEN OF GHOULS", artist: "Chase the Rabbits", cover: "5light.png", music: "Catch-Me.mp3", url: "https://roripuff.github.io/gamify/light/Light.html" }
        ];

        const carousel = document.getElementById('carousel');
        const titleEl = document.getElementById('album-title');
        const artistEl = document.getElementById('album-artist');
        const indicatorsContainer = document.getElementById('navIndicators');
        const player = document.getElementById('musicPlayer');

        let currentIndex = 2;
        let isTransitioning = false;
        let touchStartX = 0;

        albumData.forEach((album, index) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.innerHTML = `<img src="${album.cover}" alt="${album.title}">`;
            card.addEventListener('click', () => index === currentIndex ? window.location.href = album.url : navigateTo(index));
            carousel.appendChild(card);

            const bar = document.createElement('div');
            bar.className = 'indicator-bar';
            bar.addEventListener('click', () => navigateTo(index));
            indicatorsContainer.appendChild(bar);
        });

        const cards = Array.from(document.querySelectorAll('.album-card'));
        const bars = Array.from(document.querySelectorAll('.indicator-bar'));

        function navigateTo(index) {
            if (index < 0 || index >= albumData.length || isTransitioning) return;
            currentIndex = index;
            updateCarousel();
            playMusic(index);
            isTransitioning = true;
            setTimeout(() => { isTransitioning = false; }, 500);
        }

        function updateCarousel() {
            cards.forEach((card, i) => {
                card.className = 'album-card'; 
                if (i === currentIndex) card.classList.add('active');
                else if (i === currentIndex - 1) card.classList.add('left');
                else if (i === currentIndex - 2) card.classList.add('far-left');
                else if (i === currentIndex + 1) card.classList.add('right');
                else if (i === currentIndex + 2) card.classList.add('far-right');
                else card.classList.add('hidden');
            });

            bars.forEach((bar, i) => bar.classList.toggle('active', i === currentIndex));
            titleEl.innerText = albumData[currentIndex].title;
            artistEl.innerText = albumData[currentIndex].artist;
        }

        function playMusic(index) {
            player.src = albumData[index].music;
            player.play().catch(() => {});
        }

        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) navigateTo(currentIndex + 1);
            else navigateTo(currentIndex - 1);
        }, { passive: true });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'd') navigateTo(currentIndex + 1);
            else if (e.key === 'ArrowLeft' || e.key === 'a') navigateTo(currentIndex - 1);
            else if (e.key === 'Enter') window.location.href = albumData[currentIndex].url;
        });

        window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        window.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) navigateTo(currentIndex + 1);
            if (touchEndX > touchStartX + 50) navigateTo(currentIndex - 1);
        }, { passive: true });

        updateCarousel();
    </script>
</body>
</html>
