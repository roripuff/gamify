<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Music Explorer - Refined Blur</title>
    <style>
        :root {
            --bg-overlay: rgba(5, 5, 5, 0.8); /* Darken the bg image for readability */
            --accent-color: #00d2ff;
            --stage-width: 400px; 
            --stage-height: 400px;
            --spread-near: 500px; 
            --spread-far: 900px;
        }

        body {
            margin: 0;
            padding: 0;
            /* Added background image */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .stage {
            perspective: 2200px; 
            width: 100%;
            height: 650px; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel {
            position: relative;
            width: var(--stage-width);
            height: var(--stage-height);
            transform-style: preserve-3d;
        }

        .album-card {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.85s cubic-bezier(0.2, 0.8, 0.2, 1);
            -webkit-box-reflect: below 25px linear-gradient(transparent, rgba(255,255,255,0.07));
        }

        .album-card img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            filter: drop-shadow(0 25px 45px rgba(0,0,0,0.8));
        }

        /* --- 3D STATES (Lessened Blur) --- */

        .album-card.active {
            transform: translate3d(0, 0, 450px) scale(1.3);
            z-index: 100;
            filter: blur(0) brightness(1.1);
        }

        .album-card.left {
            transform: translate3d(calc(var(--spread-near) * -1), 0, -200px) rotateY(45deg) scale(1.3);
            z-index: 50;
            filter: blur(3px) brightness(0.5); /* Reduced from 8px */
            opacity: 0.8; /* Slightly more opaque */
        }

        .album-card.far-left {
            transform: translate3d(calc(var(--spread-far) * -1), 0, -550px) rotateY(65deg) scale(1.3);
            z-index: 20;
            filter: blur(6px) brightness(0.3); /* Reduced from 16px */
            opacity: 0.4;
        }

        .album-card.right {
            transform: translate3d(var(--spread-near), 0, -200px) rotateY(-45deg) scale(1.3);
            z-index: 50;
            filter: blur(3px) brightness(0.5); /* Reduced from 8px */
            opacity: 0.8;
        }

        .album-card.far-right {
            transform: translate3d(var(--spread-far), 0, -550px) rotateY(-65deg) scale(1.3);
            z-index: 20;
            filter: blur(6px) brightness(0.3); /* Reduced from 16px */
            opacity: 0.4;
        }

        .album-card.hidden {
            transform: translate3d(0, 0, -1800px) scale(1.3);
            opacity: 0;
            pointer-events: none;
        }

        /* --- UI PANEL --- */

        .info-panel {
            margin-top: 40px;
            text-align: center;
            z-index: 200;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); /* Added shadow for readability against bg image */
        }

        #album-title { 
            font-size: 2.5rem; 
            margin: 0; 
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 800;
        }

        #album-artist { 
            color: var(--accent-color); 
            font-size: 1.1rem; 
            margin-top: 5px; 
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            text-shadow: 0 1px 5px black;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="carousel" id="carousel"></div>
    </div>

    <div class="info-panel">
        <h2 id="album-title"></h2>
        <p id="album-artist"></p>
    </div>

    <div class="controls-hint">Scroll or use Arrows to navigate</div>

    <audio id="musicPlayer"></audio>

    <script>
        const albumData = [
            { title: "ROULETTE", artist: "Perfect Matches", cover: "1choose.png", music: "playerzero.mp3" },
            { title: "CHIBI ATHLETICS", artist: "Track& Field Challenge", cover: "2run.png", music: "track_field.mp3" },
            { title: "CYBER CHIBI", artist: "Data Fall", cover: "3fall.png", music: "raindrops.mp3" },
            { title: "THE DETERMINED HUG", artist: "Stormchaser's Pursuit", cover: "4chase.png", music: "chase.mp3" },
            { title: "GARDEN OF GHOULS", artist: "Chase the Rabbits", cover: "5light.png", music: "Catch-Me.mp3" }
        ];

        const carousel = document.getElementById('carousel');
        const titleEl = document.getElementById('album-title');
        const artistEl = document.getElementById('album-artist');
        const player = document.getElementById('musicPlayer');

        let currentIndex = 2;
        let isTransitioning = false;

        albumData.forEach((album, index) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            const img = document.createElement('img');
            img.src = album.cover;
            card.appendChild(img);
            
            card.addEventListener('click', () => navigateTo(index));
            carousel.appendChild(card);
        });

        const cards = Array.from(document.querySelectorAll('.album-card'));

        function navigateTo(index) {
            if (index < 0 || index >= albumData.length) return;
            currentIndex = index;
            updateCarousel();
            playMusic(index);

            isTransitioning = true;
            setTimeout(() => { isTransitioning = false; }, 600);
        }

        function updateCarousel() {
            cards.forEach((card, i) => {
                card.className = 'album-card'; 
                if (i === currentIndex) card.classList.add('active');
                else if (i === currentIndex - 1) card.classList.add('left');
                else if (i === currentIndex - 2) card.classList.add('far-left');
                else if (i === currentIndex + 1) card.classList.add('right');
                else if (i === currentIndex + 2) card.classList.add('far-right');
                else card.classList.add('hidden');
            });

            titleEl.innerText = albumData[currentIndex].title;
            artistEl.innerText = albumData[currentIndex].artist;
        }

        function playMusic(index) {
            player.src = albumData[index].music;
            player.play().catch(() => {});
        }

        window.addEventListener('wheel', (e) => {
            if (isTransitioning) return;
            if (e.deltaY > 0) { if (currentIndex < albumData.length - 1) navigateTo(currentIndex + 1); }
            else { if (currentIndex > 0) navigateTo(currentIndex - 1); }
        });

        window.addEventListener('keydown', (e) => {
            if (isTransitioning) return;
            if (e.key === 'ArrowRight' || e.key === 'd') { if (currentIndex < albumData.length - 1) navigateTo(currentIndex + 1); } 
            else if (e.key === 'ArrowLeft' || e.key === 'a') { if (currentIndex > 0) navigateTo(currentIndex - 1); }
        });

        updateCarousel();
    </script>
</body>
</html>
